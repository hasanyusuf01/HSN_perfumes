
# backend:
#   name: git-gateway
#   branch: main


# Change to your repo details:
backend:
  name: github
  repo: hasanyusuf01/HSN_perfumes
  branch: main

media_folder: public/images/products
public_folder: /images/products

site_url: https://hsnperfumes.pages.dev
display_url: https://hsnperfumes.pages.dev

logo_url: /favicon.svg

publish_mode: editorial_workflow

collections:
  # ── PRODUCTS ─────────────────────────────────────────
  - name: "products"
    label: "Products"
    label_singular: "Product"
    folder: "src/content/products"
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: name
    summary: "{{name}} — ₹{{price}} — {{category}}"
    sortable_fields: ["name", "price", "category"]
    view_filters:
      - label: "Featured"
        field: featured
        pattern: true
      - label: "Best Sellers"
        field: best_seller
        pattern: true
      - label: "In Stock"
        field: in_stock
        pattern: true
    fields:
      - { label: "Product Name", name: "name", widget: "string", hint: "Full product name e.g. 'Oud Royale'" }
      - { label: "URL Slug", name: "slug", widget: "string", hint: "URL-friendly name e.g. 'oud-royale' (lowercase, hyphens only)" }
      - { label: "SKU / Product Code", name: "sku", widget: "string", hint: "Unique product code e.g. HSN-001" }
      - { label: "Price (₹)", name: "price", widget: "number", value_type: "int", min: 0, hint: "Price in Indian Rupees" }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Oud", "Floral", "Oriental", "Woody", "Musk", "Fresh", "Citrus", "Spicy"]
      - { label: "Featured on Homepage", name: "featured", widget: "boolean", default: false }
      - { label: "Best Seller Badge", name: "best_seller", widget: "boolean", default: false }
      - { label: "Short Description", name: "short_description", widget: "text", hint: "One sentence shown on product card (max 150 chars)" }
      - label: "Full Description"
        name: "body"
        widget: "markdown"
        hint: "Full product story shown on the detail page"
      - label: "Fragrance Notes"
        name: "fragrance_notes"
        widget: "list"
        hint: "Format: 'Top: Saffron, Cardamom' — use separate entries for Top / Heart / Base"
        field: { label: "Note", name: "note", widget: "string" }
      - label: "Available Sizes"
        name: "sizes"
        widget: "list"
        hint: "e.g. 30ml, 50ml, 100ml"
        field: { label: "Size", name: "size", widget: "string" }
      - { label: "Main Product Image", name: "main_image", widget: "image", hint: "Primary image shown on cards and detail page" }
      - label: "Gallery Images"
        name: "gallery"
        widget: "list"
        hint: "Additional product images (optional)"
        field: { label: "Image", name: "image", widget: "image" }
      - { label: "In Stock", name: "in_stock", widget: "boolean", default: true }

  # ── SITE SETTINGS ────────────────────────────────────
  - name: "settings"
    label: "⚙️ Site Settings"
    files:
      - label: "Brand & Contact Settings"
        name: "brand_settings"
        file: "src/content/settings/brand.json"
        fields:
          - { label: "Brand Name", name: "brand_name", widget: "string" }
          - { label: "WhatsApp Number", name: "whatsapp_number", widget: "string", hint: "International format without + e.g. 919876543210" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "text" }
          - { label: "Instagram URL", name: "instagram_url", widget: "string", required: false }
          - { label: "Facebook URL", name: "facebook_url", widget: "string", required: false }
