[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

# Serve admin as SPA (Decap CMS is a single page app)
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

# Astro static 404 fallback
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

